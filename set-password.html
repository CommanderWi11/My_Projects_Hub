<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex, nofollow">
  <meta name="color-scheme" content="light dark">
  <title>Set password · Projects Hub</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,500;12..96,600;12..96,700&family=Hanken+Grotesk:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <script>
    (function () {
      try {
        var saved = localStorage.getItem("mph_theme");
        var sys = window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light";
        document.documentElement.setAttribute("data-theme", saved || sys);
      } catch (e) { document.documentElement.setAttribute("data-theme", "light"); }
    })();
  </script>
</head>
<body>
  <header class="topbar">
    <a class="brand" href="/" aria-label="Projects Hub">
      <span class="brand-mark" aria-hidden="true"></span>
      <span class="brand-text">Projects<span class="brand-dot">.</span></span>
      <span class="brand-sub">Hub</span>
    </a>
  </header>

  <main>
    <section class="gate">
      <div class="gate-card">
        <span class="gate-kicker">Account</span>
        <h1 class="gate-title">Set your password</h1>
        <p class="gate-note" id="note">Choose a new password for <b id="who">your hub</b>. At least 8 characters.</p>

        <form id="login-form" autocomplete="off">
          <input id="pw1" type="password" placeholder="New password" autocomplete="new-password" aria-label="New password">
          <input id="pw2" type="password" placeholder="Confirm password" autocomplete="new-password" aria-label="Confirm password">
          <button type="submit">Save password</button>
        </form>

        <a id="done" class="gate-action" href="/" hidden>Go to sign in ↗</a>
        <p id="err" class="gate-error" hidden></p>
      </div>
    </section>
  </main>

  <script>
    var $ = function (id) { return document.getElementById(id); };
    var token = new URLSearchParams(location.search).get("token") || "";
    if (!token) { $("err").textContent = "Missing or invalid link."; $("err").hidden = false; $("login-form").hidden = true; }

    document.querySelector("form").addEventListener("submit", async function (e) {
      e.preventDefault();
      $("err").hidden = true;
      var p1 = $("pw1").value, p2 = $("pw2").value;
      if (p1.length < 8) { return showErr("Password must be at least 8 characters."); }
      if (p1 !== p2) { return showErr("Passwords don't match."); }
      var btn = document.querySelector("form button");
      btn.disabled = true; btn.textContent = "Saving…";
      try {
        var res = await fetch("api/set-password", {
          method: "POST", headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ token: token, password: p1 }),
        });
        var j = await res.json();
        if (!res.ok || !j.ok) throw new Error(j.error || "Could not set password");
        document.querySelector("form").hidden = true;
        $("note").textContent = "Password updated. You can sign in now.";
        $("done").hidden = false;
      } catch (err) {
        showErr(err.message || "Could not set password");
      } finally { btn.disabled = false; btn.textContent = "Save password"; }
    });

    function showErr(m) { $("err").textContent = m; $("err").hidden = false; }
  </script>
</body>
</html>
