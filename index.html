<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex, nofollow">
  <meta name="color-scheme" content="light dark">
  <title>Projects · Hub</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,500;12..96,600;12..96,700&family=Hanken+Grotesk:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <script src="theme.js"></script>
</head>
<body class="locked">

  <header class="topbar">
    <a class="brand" href="#" aria-label="Projects Hub">
      <span class="brand-mark" aria-hidden="true"></span>
      <span class="brand-text">Projects<span class="brand-dot">.</span></span>
      <span class="brand-sub">Hub</span>
    </a>

    <div class="topbar-right">
      <span class="status" id="launcher-status" title="Checking launcher…">
        <span class="status-dot"></span>
        <span class="status-text">Checking…</span>
      </span>
      <button class="icon-btn" id="logout-btn" type="button" aria-label="Sign out" title="Sign out" hidden>
        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M15 4h3a1 1 0 0 1 1 1v14a1 1 0 0 1-1 1h-3M10 17l-5-5 5-5M5 12h11"/></svg>
      </button>
      <button class="icon-btn theme-toggle" id="theme-toggle" type="button" aria-label="Toggle theme" title="Toggle light / dark">
        <svg class="i-sun" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"><circle cx="12" cy="12" r="4.2"/><path d="M12 2.5v2.4M12 19.1v2.4M4.6 4.6l1.7 1.7M17.7 17.7l1.7 1.7M2.5 12h2.4M19.1 12h2.4M4.6 19.4l1.7-1.7M17.7 6.3l1.7-1.7"/></svg>
        <svg class="i-moon" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M20 13.2A8 8 0 1 1 10.8 4a6.4 6.4 0 0 0 9.2 9.2z"/></svg>
      </button>
    </div>
  </header>

  <main>

    <!-- ════ GATE / LANDING / LOGIN ════ -->
    <section class="gate" id="gate" hidden>
      <div class="gate-card">
        <span class="gate-kicker" id="gate-kicker">Restricted</span>
        <h1 class="gate-title" id="gate-title">Sign in</h1>
        <p class="gate-note" id="gate-note">Everything I'm building — apps, tools, automations — across Personal, Airnest, and the cockpit.</p>

        <form id="login-form" autocomplete="off" hidden>
          <input id="lg-user" type="text" placeholder="Username" autocomplete="username" aria-label="Username">
          <input id="lg-pass" type="password" placeholder="Password" autocomplete="current-password" aria-label="Password">
          <input id="lg-totp" type="text" inputmode="numeric" pattern="[0-9]*" maxlength="6" placeholder="6-digit code" aria-label="Authenticator code">
          <button type="submit">Sign in</button>
        </form>

        <button id="reset-link" class="gate-textlink" type="button" hidden>Email me a set-password link</button>
        <a id="gate-action" class="gate-action" target="_blank" rel="noopener" hidden></a>
        <p id="gate-error" class="gate-error" hidden></p>
      </div>
    </section>

    <!-- ════ APP ════ -->
    <section class="app" id="app" hidden>
      <div class="intro">
        <h1 class="intro-title">Projects</h1>
        <p class="intro-sub" id="intro-sub">A live index across every workstation. The buttons run things on your Mac.</p>
      </div>

      <div class="toolbar">
        <div class="search">
          <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><path d="m20 20-3.2-3.2"/></svg>
          <input id="search" type="search" placeholder="Filter projects…" aria-label="Filter projects">
        </div>
        <div class="filters" id="filters" role="tablist">
          <button class="chip active" data-hq="all" role="tab">All</button>
          <button class="chip" data-hq="personal" role="tab">Personal</button>
          <button class="chip" data-hq="airnest" role="tab">Airnest</button>
          <button class="chip" data-hq="pilot" role="tab">Pilot</button>
        </div>
        <span class="count" id="count">—</span>
      </div>

      <div id="groups" class="groups"></div>
      <p id="empty" class="empty" hidden>No projects match that filter.</p>
    </section>

  </main>

  <footer class="foot">
    <span>CommanderWi11 · Personal Index</span>
    <span class="foot-hint" id="foot-hint"></span>
  </footer>

  <!-- ════ OUTPUT DRAWER ════ -->
  <aside class="drawer" id="drawer" aria-live="polite" hidden>
    <div class="drawer-head">
      <div class="drawer-title">
        <span class="run-state" id="run-state"></span>
        <span class="run-cmd" id="run-cmd">—</span>
      </div>
      <div class="drawer-actions">
        <a class="run-link" id="run-link" target="_blank" rel="noopener" hidden></a>
        <button class="ghost-btn" id="run-stop" type="button" hidden>Stop</button>
        <button class="ghost-btn" id="run-clear" type="button">Clear</button>
        <button class="icon-btn" id="drawer-close" type="button" aria-label="Close output">
          <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><path d="M6 6l12 12M18 6 6 18"/></svg>
        </button>
      </div>
    </div>
    <pre class="drawer-out" id="drawer-out"></pre>
  </aside>

  <div class="toast" id="toast" hidden></div>

  <script src="app.js"></script>
</body>
</html>
